version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrovelt_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://johndoe:randompassword@db:5432/mydb?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app

  db:
    image: postgres:15-alpine
    container_name: agrovelt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: johndoe
      POSTGRES_PASSWORD: randompassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U johndoe -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  prisma:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrovelt_prisma
    command: npx prisma studio --browser none
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://johndoe:randompassword@db:5432/mydb?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app

volumes:
  postgres_data:
