services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: agrovelt-app
    container_name: agrovet_app
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://johndoe:randompassword@db:5432/mydb?schema=public
      - ADMIN_NAME=nampellah
      - ADMIN_EMAIL=bnampellah1@gmail.com
      - ADMIN_PASSWORD=Admin123!
      - ADMIN_ORG_NAME=nampellah
      - SEED_FIREBASE_PRODUCTS=true
      - MNYAMA_SHOP_FIREBASE_PROJECT_ID=afya-mnyama-digital
      - MNYAMA_SHOP_FIREBASE_API_KEY=AIzaSyARQmqdNHB5EW99lQtrhevPvbHc_J2AFyM
      - FIREBASE_PRODUCTS_COLLECTION=products
      - FIREBASE_PUBLISHED_ONLY=true
    command: sh -c "npx prisma db push && npm run prisma:seed && npx ts-node src/index.ts"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

  db:
    image: postgres:15-alpine
    container_name: agrovet_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: johndoe
      POSTGRES_PASSWORD: randompassword
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U johndoe -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  prisma:
    image: agrovelt-app
    container_name: agrovet_prisma
    command: npx prisma studio --port 5555 --browser none
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://johndoe:randompassword@db:5432/mydb?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  postgres_data:
  node_modules:
